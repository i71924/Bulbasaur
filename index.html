<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>雞家莊好友限定優惠領取頁面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF6E9;
    --bulba:#8BC9A0;
    --bulba-dark:#5FA37D;
    --bulb-forest:#3F7D52;
    --forest-deep:#2F5F3E;
    --petal:#F2A6C5;
    --petal-deep:#E07FA8;
    --ink:#2F3B2A;
    --ink-soft:#5C6B53;
  }

  *{ box-sizing:border-box; }
  html, body{
    height:100%;
    margin:0;
    overflow:hidden;
    background:radial-gradient(circle at 50% -10%, #EAF3E6 0%, var(--cream) 45%, #F6E9EF 100%);
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
  }

  .leaf{
    position:fixed;
    opacity:.35;
    font-size:20px;
  }

  .page{
    height:100dvh;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(14px,3.2dvh,26px);
    padding:max(18px, env(safe-area-inset-top)) 22px max(18px, env(safe-area-inset-bottom));
    text-align:center;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.65);
    border:1.5px solid var(--bulba-dark);
    color:var(--forest-deep);
    padding:4px 14px;
    border-radius:999px;
    font-size:clamp(11px,2.6vw,13px);
    letter-spacing:.04em;
  }

  h1{
    font-family:'Noto Sans TC', sans-serif;
    font-weight:900;
    font-size:clamp(26px,7.8vw,38px);
    line-height:1.32;
    color:var(--forest-deep);
    margin:0;
    text-shadow:1.5px 1.5px 0 rgba(255,255,255,.55);
  }
  h1 .name{ color:var(--petal-deep); }

  .photo-stage{
    position:relative;
    width:min(86vw, 480px);
  }
  .photo-frame{
    aspect-ratio:1438/948;
    width:100%;
    border-radius:26px;
    border:5px solid var(--petal);
    background:
      radial-gradient(circle at 30% 20%, rgba(143,201,160,.30), transparent 60%),
      repeating-linear-gradient(135deg, #fdf8ee 0 14px, #f6eedb 14px 28px);
    box-shadow:0 8px 0 rgba(224,127,168,.22), 0 2px 18px rgba(63,125,82,.12);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  /* 妙蛙種子貼紙：縮小成輔助角色，疊在相框角落 */
  .mascot{
    position:absolute;
    bottom:-24px;
    right:-18px;
    width:clamp(84px,24vw,118px);
    height:clamp(84px,24vw,118px);
    border-radius:50%;
    background:var(--cream);
    border:4px solid var(--bulba-dark);
    box-shadow:0 5px 12px rgba(47,95,62,.24);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-9deg);
    animation:breathe 4.4s ease-in-out infinite;
  }
  .mascot img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    display:block;
  }

  @keyframes breathe{
    0%,100%{ transform:rotate(-9deg) scale(1); }
    50%{ transform:rotate(-9deg) scale(1.05); }
  }

  .caption{
    font-size:clamp(13px,3.2vw,15px);
    color:var(--ink-soft);
    margin:0;
  }

  /* ===================== 開場：禮物盒 ===================== */
  #mainContent{
    opacity:0;
    transition:opacity .6s ease;
  }
  #mainContent.show{ opacity:1; }

  .gift-screen{
    position:fixed;
    inset:0;
    z-index:60;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(14px,3dvh,24px);
    background:radial-gradient(circle at 50% -10%, #EAF3E6 0%, var(--cream) 45%, #F6E9EF 100%);
    transition:opacity .5s ease, visibility .5s ease;
  }
  .gift-screen.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .gift-stage{
    position:relative;
    width:clamp(150px,42vw,230px);
  }
  .gift-box{ cursor:pointer; }
  .gift-box-svg{
    width:100%;
    display:block;
    animation:gift-bob 2.2s ease-in-out infinite;
    transform-origin:50% 88%;
  }
  @keyframes gift-bob{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-6px) rotate(-2deg); }
  }
  .gift-screen.opening .gift-box-svg{ animation:none; }

  .gift-lid{
    transform-origin:50% 100%;
    transition:transform .55s cubic-bezier(.34,1.56,.64,1), opacity .45s ease;
  }
  .gift-screen.opening .gift-lid{
    transform:translateY(-72px) rotate(-22deg);
    opacity:0;
  }
  .gift-body{ transition:transform .35s ease; }
  .gift-screen.opening .gift-body{ transform:scale(1.04); }

  .tap-hint{
    font-weight:700;
    font-size:clamp(15px,3.6vw,18px);
    color:var(--forest-deep);
    margin:0;
    animation:pulse-hint 1.4s ease-in-out infinite;
    transition:opacity .3s ease;
  }
  @keyframes pulse-hint{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }
  .gift-screen.opening .tap-hint{ opacity:0; }

  .confetti{
    position:absolute;
    top:48%;
    left:50%;
    width:0;
    height:0;
  }
  .confetti span{
    position:absolute;
    left:0;
    top:0;
    font-size:20px;
    opacity:0;
  }
  .gift-screen.opening .confetti span{
    animation:burst-out .9s ease-out forwards;
  }
  @keyframes burst-out{
    0%{ opacity:0; transform:translate(0,0) scale(.4); }
    15%{ opacity:1; }
    100%{ opacity:0; transform:translate(var(--tx), var(--ty)) scale(1.1); }
  }

  @media (prefers-reduced-motion: reduce){
    .mascot{ animation:none; }
    .gift-box-svg{ animation:none; }
    .tap-hint{ animation:none; }
    .confetti span{ animation:none !important; opacity:0 !important; }
    .gift-lid, .gift-screen, #mainContent{ transition-duration:.2s; }
  }

  /* 極矮螢幕（例如橫向手機）：適度縮小間距，確保不出現捲軸 */
  @media (max-height:560px){
    .page{ gap:10px; padding-top:10px; padding-bottom:10px; }
    h1{ font-size:clamp(20px,6vw,28px); }
    .eyebrow{ display:none; }
  }
</style>
</head>
<body>

<!-- ===================== 開場：禮物盒 ===================== -->
<div class="gift-screen" id="giftScreen">
  <div class="gift-stage">
    <div class="confetti" aria-hidden="true">
      <span style="--tx:-60px; --ty:-90px; animation-delay:.05s;">✨</span>
      <span style="--tx:55px; --ty:-100px; animation-delay:.1s;">🌸</span>
      <span style="--tx:-90px; --ty:-40px; animation-delay:.15s;">💚</span>
      <span style="--tx:90px; --ty:-50px; animation-delay:.08s;">✨</span>
      <span style="--tx:0px; --ty:-120px; animation-delay:.2s;">🌿</span>
      <span style="--tx:-30px; --ty:-75px; animation-delay:.25s;">🌸</span>
    </div>

    <div class="gift-box" id="giftBox" role="button" tabindex="0" aria-label="點擊開啟禮物盒">
      <svg class="gift-box-svg" viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="182" rx="68" ry="9" fill="#2F5F3E" opacity="0.15"/>
        <g class="gift-body">
          <rect x="40" y="92" width="120" height="78" rx="10" fill="#F2A6C5"/>
          <rect x="92" y="92" width="16" height="78" fill="#8BC9A0"/>
        </g>
        <g class="gift-lid">
          <rect x="32" y="72" width="136" height="28" rx="10" fill="#E07FA8"/>
          <rect x="92" y="72" width="16" height="28" fill="#5FA37D"/>
          <ellipse cx="78" cy="58" rx="20" ry="15" fill="#3F7D52" transform="rotate(-18 78 58)"/>
          <ellipse cx="122" cy="58" rx="20" ry="15" fill="#3F7D52" transform="rotate(18 122 58)"/>
          <circle cx="100" cy="62" r="11" fill="#2F5F3E"/>
        </g>
      </svg>
    </div>
  </div>

  <p class="tap-hint">👉 限定優惠請點我 👈</p>
</div>

<!-- ===================== 主要內容 ===================== -->
<div id="mainContent">

<span class="leaf" style="top:6%; left:6%;">🍃</span>
<span class="leaf" style="top:8%; right:8%;">🌿</span>
<span class="leaf" style="bottom:6%; left:9%;">🍃</span>

<div class="page">
  <span class="eyebrow">🌱 妙蛙種子悄悄通知</span>

  <h1>恭喜<span class="name">小蝴蝶</span><br>要當姊姊囉！🎉</h1>

  <div class="photo-stage">
    <div class="photo-frame">
      <img src="ultrasound.jpg" alt="超音波照片" style="width:100%;height:100%;object-fit:cover;">
    </div>

    <!-- 妙蛙種子小貼紙：輔助角色，疊在相框右下角 -->
    <div class="mascot" aria-hidden="true">
      <img src="bulbasaur.jpg" alt="妙蛙種子">
    </div>
  </div>

  <p class="caption">我們家最新的小種子 🌷 等你來見面</p>
</div>

</div>

<script>
  (function(){
    var screen = document.getElementById('giftScreen');
    var box = document.getElementById('giftBox');
    var main = document.getElementById('mainContent');
    var opened = false;

    function openGift(){
      if (opened) return;
      opened = true;
      screen.classList.add('opening');
      setTimeout(function(){
        screen.classList.add('hide');
        main.classList.add('show');
      }, 850);
      setTimeout(function(){
        screen.style.display = 'none';
      }, 1400);
    }

    box.addEventListener('click', openGift);
    box.addEventListener('keydown', function(e){
      if (e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        openGift();
      }
    });
  })();
</script>

</body>
</html>
